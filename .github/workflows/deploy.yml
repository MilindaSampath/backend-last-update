name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. සර්වර් එකේ Java 17 සහ Maven තියෙනවාදැයි බලා නැත්නම් Install කිරීම
            sudo apt update
            sudo apt install openjdk-17-jdk maven -y

            # 2. ප්‍රොජෙක්ට් එක ඇති තැනට යෑම (නැත්නම් Clone කිරීම)
            if [ ! -d "~/backend-last-update" ]; then
              git clone https://github.com/MilindaSampath/backend-last-update.git ~/backend-last-update
            fi
            
            cd ~/backend-last-update
            git pull origin main

            # 3. දැනට වැඩ කරන පරණ App එක නවත්වන්න (Port 8080 පාවිච්චි කරන්නේ නම්)
            # 8080 වෙනුවට ඔබේ App එක වැඩ කරන Port එක මෙතැනට දාන්න
            sudo fuser -k 8080/tcp || true

            # 4. Maven පාවිච්චි කරලා අලුත් Jar එක Build කිරීම
            mvn clean package -DskipTests

            # 5. App එක Background එකේ Run කිරීම (Log එක app.log එකට වැටේවි)
            nohup java -jar target/*.jar > app.log 2>&1 &