name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # සර්වර් එක update කර ගැනීම
            sudo apt update && sudo apt install git -y
            
            # ප්‍රොජෙක්ට් එක සර්වර් එකේ නැත්නම් Clone කිරීම
            if [ ! -d "backend-last-update" ]; then
              git clone https://github.com/MilindaSampath/backend-last-update.git ~/backend-last-update
            fi

            
            
            cd ~/backend-last-update
            git pull origin main
            
            # Docker හරහා App එක Build කර Run කිරීම
            sudo docker build -t lms-app .
            sudo docker stop lms-container || true
            sudo docker rm lms-container || true
            sudo docker run -d -p 80:8080 --name lms-container lms-app