name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main  # ඔබේ GitHub එකේ තියෙන්නේ main කියන branch එක නම් මෙය එසේම තියන්න

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # සර්වර් එකට ගොස් කරන වැඩ ටික
            sudo apt update && sudo apt install git -y
            
            # ප්‍රොජෙක්ට් එක සර්වර් එකේ නැත්නම් Clone කරනවා, තියෙනවා නම් ඒකට යනවා
            if [ ! -d "backend-last-update" ]; then
              git clone https://github.com/MilindaSampath/backend-last-update.git
            fi
            
            cd backend-last-update
            git pull origin main
            
            # Docker හරහා App එක Run කරනවා
            sudo docker build -t lms-app .
            sudo docker stop lms-container || true
            sudo docker rm lms-container || true
            sudo docker run -d -p 80:8080 --name lms-container lms-app